<nav class="cms-sidebar">
  <div class="brand">
    <a routerLink="/faculty/dashboard" class="brand-link">
      <div class="logo-box">
        <i class="fas fa-graduation-cap"></i>
      </div>
      <span class="brand-text">CMS</span>
    </a>
  </div>

  <div class="quick-section">
    <ul class="quick-list">
      <li>
        <a routerLink="/faculty/dashboard" class="quick-link" routerLinkActive="active"
          [routerLinkActiveOptions]="{exact: true}">
          <span class="ql-icon"><i class="fas fa-chart-pie"></i></span>
          <span class="ql-label">Dashboard</span>
        </a>
      </li>

      <li>
        <a routerLink="/faculty/schedule" class="quick-link" routerLinkActive="active">
          <span class="ql-icon"><i class="fas fa-clock"></i></span>
          <span class="ql-label">Schedule</span>
        </a>
      </li>

      <li>
        <a routerLink="/faculty/assignments" class="quick-link" routerLinkActive="active">
          <span class="ql-icon"><i class="fas fa-edit"></i></span>
          <span class="ql-label">Manage Assignment</span>
        </a>
      </li>

      <li>
        <a routerLink="/faculty/grades" class="quick-link" routerLinkActive="active">
          <span class="ql-icon"><i class="fas fa-medal"></i></span>
          <span class="ql-label">Grade Submission</span>
        </a>
      </li>

      <li>
        <a routerLink="/faculty/notices" class="quick-link" routerLinkActive="active">
          <span class="ql-icon"><i class="fas fa-envelope-open-text"></i></span>
          <span class="ql-label">Notices</span>
        </a>
      </li>

      <li>
        <a routerLink="/faculty/attendance" class="quick-link" routerLinkActive="active">
          <span class="ql-icon"><i class="fas fa-user-check"></i></span>
          <span class="ql-label">Attendance</span>
        </a>
      </li>

      <li>
        <a routerLink="/faculty/chat" class="quick-link" routerLinkActive="active">
          <span class="ql-icon"><i class="fas fa-comments"></i></span>
          <span class="ql-label">Chat</span>
          <span *ngIf="(unreadCount$ | async) || 0 > 0" class="sidebar-badge">{{ unreadCount$ | async }}</span>
        </a>
      </li>
    </ul>
  </div>

  <div class="sidebar-footer">
    <span class="muted">© 2026 Academic Staff Portal</span>
  </div>
</nav>
