<div class="container mt-3">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <h4>My Attendance</h4>
    <div>
      <button class="btn btn-sm btn-danger" (click)="clearAll()" [disabled]="loading">Clear All</button>
    </div>
  </div>

  <div *ngIf="loading" class="text-center my-3">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div *ngIf="!loading && attendance && attendance.length; else noData">
    <p>Total records: {{ attendance.length }}</p>
    <table class="table table-sm table-striped">
      <thead>
        <tr>
          <th>S.N.</th>
          <th>Faculty Name</th>
          <th>Clock-in Time</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let a of attendance; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ a?.faculty?.name || 'N/A' }}</td>
          <td>{{ a?.clock_in_time || a?.created_at | date:'medium' }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <ng-template #noData>
    <div *ngIf="!loading" class="alert alert-info">No attendance recorded yet.</div>
  </ng-template>
</div>
